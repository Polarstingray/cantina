<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cantina</title>
    <link rel="stylesheet" href="css/styles.css">
    <script type="module" src="js/app.js"></script>
</head>
<body class="logged-out">
    <!-- LOGIN SCREEN (shown when body.logged-out) ============================ -->
    <div id="login-screen">
        <form id="login-form" class="form login-form">
            <h1>Cantina</h1>
            <p class="tagline">sign in to your household</p>
            <label class="wide">Email
                <input name="email" type="email" autocomplete="username" required>
            </label>
            <label class="wide">Password
                <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <div class="form-actions">
                <button type="submit">Sign in</button>
            </div>
            <p id="login-error" class="login-error" hidden></p>
        </form>
    </div>

    <header>
        <div class="header-top">
            <h1><a href="#/">Cantina</a></h1>
            <nav class="topnav">
                <a href="#/" data-route="/">Dashboard</a>
                <a href="#/list" data-route="/list">Grocery list</a>
                <a href="#/inventory" data-route="/inventory">Inventory</a>
                <a href="#/spending" data-route="/spending">Spending</a>
            </nav>
            <div class="user-area" id="user-area" hidden>
                <span id="user-email" class="muted"></span>
                <button type="button" id="logout-btn" class="ghost">Log out</button>
            </div>
        </div>
        <p class="tagline">household grocery &amp; meal tracker</p>
    </header>

    <div id="status" class="status" hidden></div>

    <!-- DASHBOARD ============================================================ -->
    <main id="view-dashboard" class="view">
        <section id="foods-section">
            <div class="section-head">
                <h2>Foods</h2>
                <button type="button" class="toggle" data-target="add-food-form">+ add food</button>
            </div>

            <form id="add-food-form" class="form" hidden>
                <div class="scan-row">
                    <input name="barcode" type="text" inputmode="numeric"
                        placeholder="barcode (UPC)" autocomplete="off">
                    <button type="button" id="lookup-btn" class="ghost">Lookup</button>
                    <button type="button" id="scan-btn" class="ghost">Scan with camera</button>
                </div>
                <div class="form-grid">
                    <label class="wide">Name<input name="name" required></label>
                    <label>Cost ($)<input name="cost" type="number" step="0.01" min="0" value="0"></label>
                    <label>Calories<input name="cals" type="number" min="0" value="0"></label>
                    <label>Carbs (g)<input name="carbs" type="number" step="0.1" min="0" value="0"></label>
                    <label>Protein (g)<input name="protein" type="number" step="0.1" min="0" value="0"></label>
                    <label>Fat (g)<input name="fat" type="number" step="0.1" min="0" value="0"></label>
                    <label class="wide">Stores (comma separated)<input name="stores" placeholder="cub, target"></label>
                    <label class="wide">Description<input name="desc"></label>
                </div>
                <details class="disclosure">
                    <summary>More fields</summary>
                    <div class="form-grid">
                        <label class="wide">Brand<input name="brand"></label>
                        <label class="wide">Serving size<input name="serving_size" placeholder="100g, 1 slice, ..."></label>
                        <label>Fiber (g)<input name="fiber" type="number" step="0.1" min="0" value="0"></label>
                        <label>Sugar (g)<input name="sugar" type="number" step="0.1" min="0" value="0"></label>
                        <label>Sodium (mg)<input name="sodium" type="number" step="0.1" min="0" value="0"></label>
                    </div>
                </details>
                <div class="form-actions">
                    <button type="button" class="ghost cancel" data-target="add-food-form">Cancel</button>
                    <button type="submit">Add food</button>
                </div>
            </form>

            <div id="foods" class="cards"></div>
        </section>

        <section id="meals-section">
            <div class="section-head">
                <h2>Meals</h2>
                <button type="button" class="toggle" data-target="add-meal-form">+ add meal</button>
            </div>

            <form id="add-meal-form" class="form" hidden>
                <div class="form-grid">
                    <label class="wide">Name<input name="name" required></label>
                    <label class="wide">Description<input name="desc"></label>
                </div>
                <div class="ingredients">
                    <div class="ingredients-head">
                        <span>Ingredients</span>
                        <button type="button" id="add-ingredient">+ ingredient</button>
                    </div>
                    <div id="ingredient-rows"></div>
                </div>
                <div class="form-actions">
                    <button type="button" class="ghost cancel" data-target="add-meal-form">Cancel</button>
                    <button type="submit">Add meal</button>
                </div>
            </form>

            <div id="meals" class="cards"></div>
        </section>

        <section id="inventory-section">
            <div class="section-head">
                <h2>Inventory</h2>
                <a class="muted" href="#/inventory">full inventory page →</a>
            </div>
            <div id="inventory"></div>
        </section>

        <section id="list-section">
            <div class="section-head">
                <h2>Grocery list</h2>
                <div class="head-actions">
                    <button type="button" class="toggle" data-target="add-list-form">+ add to list</button>
                    <a class="muted" href="#/list">full grocery list →</a>
                </div>
            </div>

            <form id="add-list-form" class="form" hidden>
                <datalist id="dashboard-list-food-options"></datalist>
                <div class="form-grid">
                    <label class="wide">Item<input name="name" list="dashboard-list-food-options"
                        placeholder="type or pick from catalog" required></label>
                    <label>Amount<input name="amount" type="number" min="0.5" step="0.5" value="1"></label>
                </div>
                <div class="form-actions">
                    <button type="button" class="ghost cancel" data-target="add-list-form">Cancel</button>
                    <button type="submit">Add to list</button>
                </div>
            </form>

            <div id="list"></div>
        </section>

        <section id="menu-section">
            <div class="section-head">
                <h2>Menu</h2>
                <span class="muted">what you can make right now</span>
            </div>
            <div id="menu"></div>
        </section>
    </main>

    <!-- DETAIL VIEWS ========================================================= -->
    <main id="view-food" class="view" hidden></main>
    <main id="view-meal" class="view" hidden></main>
    <main id="view-list" class="view" hidden></main>
    <main id="view-inventory" class="view" hidden></main>
    <main id="view-spending" class="view" hidden></main>
</body>
</html>
